{% extends 'admin/admin_base.html' %}

{% block title %}مركز المراقبة | محجوب أونلاين{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold" style="color: var(--royal-purple);">لوحة المراقبة المركزية</h2>
            <p class="text-muted">مرحباً بك يا سيد علي، إليك ملخص العمليات الحالية.</p>
        </div>
    </div>

    <!-- كروت الإحصائيات السريعة -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4" style="border-right: 5px solid var(--mahjoub-gold) !important; border-radius: 15px;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-circle me-3">
                        <i class="fas fa-truck-field fa-2x" style="color: var(--royal-purple);"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">الموردين</h6>
                        <h3 class="fw-bold mb-0">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4" style="border-right: 5px solid var(--mahjoub-gold) !important; border-radius: 15px;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-circle me-3">
                        <i class="fas fa-boxes-stacked fa-2x" style="color: var(--royal-purple);"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">المنتجات النشطة</h6>
                        <h3 class="fw-bold mb-0">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4" style="border-right: 5px solid var(--mahjoub-gold) !important; border-radius: 15px;">
                <div class="d-flex align-items-center">
                    <div class="icon-box bg-light p-3 rounded-circle me-3">
                        <i class="fas fa-coins fa-2x" style="color: var(--royal-purple);"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">صافي الأرباح</h6>
                        <h3 class="fw-bold mb-0">0 ريال</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
