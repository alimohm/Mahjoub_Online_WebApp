<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيد المراجعة السيادية | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --p-deep: #2d1144;
            --p-neon: #8A2BE2;
            --gold: #D4AF37;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            text-align: center;
        }

        .waiting-container {
            background: white;
            padding: clamp(30px, 8vw, 60px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(45, 17, 68, 0.1);
            max-width: 500px;
            width: 90%;
            border-top: 6px solid var(--p-neon);
        }

        .icon-box {
            font-size: 60px;
            color: var(--gold);
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { color: var(--p-deep); font-weight: 900; font-size: 24px; margin-bottom: 15px; }
        p { color: #666; font-size: 16px; line-height: 1.6; }

        .status-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            margin-top: 20px;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 30px;
            display: inline-block;
            color: var(--p-neon);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="waiting-container">
        <div class="icon-box">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <h1>مرحباً بك يا {{ current_user.name }}</h1>
        <p>
            لقد استلمنا طلب انضمامك إلى <b>محجوب أونلاين</b>.<br>
            حسابك الآن في مرحلة <b>التدقيق السيادي</b> لضمان جودة الشراكة.
        </p>
        
        <div class="status-badge">
            <i class="fa-solid fa-hourglass-half"></i> الحالة: قيد المراجعة الإدارية
        </div>

        <br>
        <a href="{{ url_for('supplier_panel.logout') }}" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
        </a>
    </div>

</body>
</html>
