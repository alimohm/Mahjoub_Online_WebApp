{% extends "admin/admin_base.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-9">
                    <input type="text" id="liveSearch" class="form-control form-control-lg" 
                           placeholder="🔍 البحث الفوري: أدخل اسم المتجر أو كود المحفظة...">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-warning w-100 btn-lg" data-bs-toggle="modal" data-bs-target="#newSettlementModal">
                        <i class="fas fa-plus"></i> سند تسوية جديد
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="btn-group shadow-sm">
            <button class="btn btn-outline-primary" onclick="filterTable('all')">عرض الكل</button>
            <button class="btn btn-outline-warning" onclick="filterTable('pending')">قيد الانتظار</button>
            <button class="btn btn-outline-success" onclick="filterTable('approved')">تم الاعتماد</button>
            <button class="btn btn-outline-danger" onclick="filterTable('rejected')">الملغي</button>
        </div>
        <div class="input-group w-auto">
            <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
            <input type="date" class="form-control" id="dateFilter">
        </div>
    </div>

    <div class="table-responsive bg-white rounded shadow-sm">
        <table class="table table-hover align-middle" id="mainTable">
            <thead class="table-dark">
                <tr>
                    <th>التاريخ</th>
                    <th>المرجع</th>
                    <th>المبلغ</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
// بحث فوري
document.getElementById('liveSearch').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('#tableBody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
    });
});

// فلترة الحالة
function filterTable(status) {
    document.querySelectorAll('#tableBody tr').forEach(row => {
        if (status === 'all' || row.dataset.status === status) row.style.display = '';
        else row.style.display = 'none';
    });
}
</script>
{% endblock %}
