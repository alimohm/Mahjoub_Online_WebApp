{% extends "admin_base.html" %}

{% block title %}إضافة مورد جديد | محجوب أونلاين{% endblock %}

{% block content %}
<div class="container-fluid" id="main-content">
    <!-- رأس الصفحة -->
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h2 class="fw-bold" style="color: #4B0082;">🛡️ تعميد مورد جديد</h2>
            <p class="text-muted">نظام الأرشفة السيادي لمنصة محجوب أونلاين.</p>
        </div>
        <!-- تم إضافة عرض المعرف القادم بشكل بسيط -->
        <div class="p-2 border rounded bg-light text-center">
            <small class="d-block text-muted">رقم الاعتماد</small>
            <span class="fw-bold text-dark">SUP-{{ next_id if next_id else '000' }}</span>
        </div>
    </div>

    <form id="addSupplierForm" method="POST" enctype="multipart/form-data">
        <div class="row g-4">
            
            <!-- العمود الأول: الهوية الرقمية والوثائق -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100" style="border-top: 5px solid #D4AF37 !important;">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-user-shield fa-lg me-2" style="color: #4B0082;"></i>
                        <h5 class="fw-bold mb-0">الهوية والتوثيق</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">اسم المستخدم</label>
                        <input type="text" name="username" class="form-control bg-light border-0" placeholder="ali_2026" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">البريد الإلكتروني</label>
                        <input type="email" name="email" class="form-control bg-light border-0" placeholder="mail@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">نوع الوثيقة</label>
                        <select name="identity_type" class="form-select bg-light border-0">
                            <option value="بطاقة شخصية">بطاقة شخصية</option>
                            <option value="سجل تجاري">سجل تجاري</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">رفع صورة الوثيقة</label>
                        <input type="file" name="identity_image" class="form-control bg-light border-0">
                    </div>
                </div>
            </div>

            <!-- العمود الثاني: النشاط والموقع -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100" style="border-top: 5px solid #D4AF37 !important;">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-store fa-lg me-2" style="color: #4B0082;"></i>
                        <h5 class="fw-bold mb-0">النشاط والنطاق</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">الاسم التجاري</label>
                        <input type="text" name="trade_name" class="form-control bg-light border-0" placeholder="مؤسسة الفقية" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">رقم الهاتف</label>
                        <input type="text" name="phone" class="form-control bg-light border-0" placeholder="77xxxxxxx" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-muted small">المحافظة</label>
                            <input type="text" name="province" class="form-control bg-light border-0" value="الحديدة">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-muted small">المديرية</label>
                            <input type="text" name="district" class="form-control bg-light border-0" placeholder="الخوخة">
                        </div>
                    </div>
                </div>
            </div>

            <!-- العمود الثالث: البيانات المالية والأمان -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100" style="border-top: 5px solid #D4AF37 !important;">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-wallet fa-lg me-2" style="color: #4B0082;"></i>
                        <h5 class="fw-bold mb-0">المحفظة والأمان</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">اسم البنك / الصرافة</label>
                        <input type="text" name="bank_name" class="form-control bg-light border-0" placeholder="الكريمي / النجم">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">رقم الحساب</label>
                        <input type="text" name="bank_acc" class="form-control bg-light border-0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">كلمة المرور الأولية</label>
                        <input type="password" name="password" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mt-auto">
                        <button type="submit" class="btn w-100 fw-bold shadow-sm" style="background: #D4AF37; color: white; transition: 0.3s; padding: 12px;">
                            حفظ واعتماد المورد <i class="fas fa-check-circle ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<style>
    .form-control:focus, .form-select:focus {
        box-shadow: none;
        border: 1px solid #D4AF37 !important;
        background-color: #fff !important;
    }
    .btn:hover {
        background: #4B0082 !important;
        transform: translateY(-2px);
    }
    label { font-size: 0.85rem; }
</style>
{% endblock %}
