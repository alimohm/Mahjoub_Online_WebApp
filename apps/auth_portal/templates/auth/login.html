<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | محجوب أونلاين</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-purple: #2E0854;
            --soft-white: #f4f4f4;
        }
        body {
            background-color: #0f0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--soft-white);
        }
        .login-card {
            background: linear-gradient(145deg, #1a1a1a, #252525);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--primary-gold);
            width: 350px;
            text-align: center;
        }
        .login-card h2 {
            color: var(--primary-gold);
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-gold);
            color: var(--deep-purple);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #b8962e;
            transform: translateY(-2px);
        }
        .flash-messages {
            color: #ff4d4d;
            font-size: 0.85em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>محجوب أونلاين</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            {{ message }}
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" name="username" placeholder="ali_mahjoub" required>
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" name="password" placeholder="123" required>
        </div>
        <button type="submit" class="btn-login">تسجيل الدخول السيادي</button>
    </form>
</div>

</body>
</html>
