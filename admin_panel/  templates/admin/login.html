<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول - محجوب أونلاين</title>
    <style>
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #fff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #4B0082; /* بنفسجي غامق */
            text-align: center;
        }
        .logo {
            color: #D4AF37; /* ذهبي */
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        input:focus {
            border-color: #4B0082;
        }
        button {
            width: 96%;
            padding: 12px;
            background-color: #4B0082;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #D4AF37;
            color: #000;
        }
        .footer-text {
            margin-top: 1rem;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">محجوب أونلاين</div>
        <h3 style="color: #333;">تسجيل الدخول</h3>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول النظام</button>
        </form>
        <div class="footer-text">سوقك الذكي - Smart Market</div>
    </div>
</body>
</html>
