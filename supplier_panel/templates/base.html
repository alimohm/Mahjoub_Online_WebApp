<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}بوابة المورد | محجوب أونلاين{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        :root { --p-color: #632C8F; --g-color: #D4AF37; --dark: #0a0a0a; }
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #e0e0e0; }
        .sidebar { width: 260px; height: 100vh; background: var(--dark); position: fixed; border-left: 1px solid rgba(212,175,55,0.1); }
        .main-content { margin-right: 260px; padding: 30px; }
        .nav-link { color: #94a3b8; padding: 12px 20px; display: block; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(99, 44, 143, 0.1); color: var(--g-color); }
        .stat-card { background: rgba(20,20,20,0.6); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="p-4 text-center">
            <h5 class="fw-bold text-white">بوابة <span style="color: var(--g-color);">الموردين</span></h5>
            <hr class="border-secondary">
        </div>
        <nav>
            <a href="{{ url_for('supplier_panel.dashboard') }}" class="nav-link active"><i class="fas fa-th-large me-2"></i> الإحصائيات</a>
            <a href="{{ url_for('supplier_panel.add_product') }}" class="nav-link"><i class="fas fa-plus-circle me-2"></i> رفع منتج جديد</a>
            <a href="#" class="nav-link"><i class="fas fa-box me-2"></i> منتجاتي</a>
            <a href="#" class="nav-link"><i class="fas fa-wallet me-2"></i> كشف المحفظة</a>
            <hr class="border-secondary">
            <a href="{{ url_for('supplier_panel.logout') }}" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> تسجيل الخروج</a>
        </nav>
    </div>

    <div class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} rounded-pill border-0 shadow-sm">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
