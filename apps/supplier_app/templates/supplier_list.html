<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قائمة الموردين السياديين</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/royal_identity.css') }}">
</head>
<body style="background-color: #0A0A0A; color: white; font-family: Arial, sans-serif;">
    <h1 style="color: #D4AF37; text-align: center;">🛡️ إدارة الموردين - محجوب أونلاين</h1>
    <table border="1" style="width: 80%; margin: auto; border-color: #3D0066;">
        <thead>
            <tr style="background-color: #3D0066;">
                <th>المعرف السيادي</th>
                <th>الاسم التجاري</th>
                <th>الرتبة</th>
                <th>الحالة</th>
                <th>الرصيد (YER)</th>
            </tr>
        </thead>
        <tbody>
            {% for s in suppliers %}
            <tr>
                <td>{{ s.sovereign_id }}</td>
                <td>{{ s.trade_name }}</td>
                <td>{{ s.tier }}</td>
                <td>{{ s.status }}</td>
                <td>{{ s.balance_yer }}</td>
            </tr>
            {% else %}
            <tr><td colspan="5" style="text-align: center;">لا يوجد موردون معمدون حتى الآن.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
