{% extends "admin_base.html" %}

{% block title %}إضافة مورد جديد | محجوب أونلاين{% endblock %}

{% block content %}
<div class="container-fluid" id="main-content">
    <!-- عنوان الصفحة السيادي -->
    <div class="mb-4">
        <h2 class="fw-bold" style="color: #4B0082;">تعميد مورد جديد</h2>
        <p class="text-muted">أدخل بيانات المورد لاعتماده في منظومة "محجوب أونلاين" الذكية.</p>
    </div>

    <form id="addSupplierForm">
        <div class="row g-4">
            <!-- العمود الأول: البيانات الأساسية -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100" style="border-top: 5px solid #D4AF37 !important;">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-id-card fa-lg me-2" style="color: #4B0082;"></i>
                        <h5 class="fw-bold mb-0">الهوية الرقمية</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">اسم المستخدم</label>
                        <input type="text" name="username" class="form-control bg-light border-0" placeholder="مثال: ali_2026" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">البريد الإلكتروني</label>
                        <input type="email" name="email" class="form-control bg-light border-0" placeholder="mail@example.com" required>
                    </div>
                </div>
            </div>

            <!-- العمود الثاني: بيانات النشاط التجاري -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100" style="border-top: 5px solid #D4AF37 !important;">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-store fa-lg me-2" style="color: #4B0082;"></i>
                        <h5 class="fw-bold mb-0">النشاط التجاري</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">الاسم التجاري (المؤسسة)</label>
                        <input type="text" name="trade_name" class="form-control bg-light border-0" placeholder="مثال: الفقية للتجارة" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">رقم الهاتف</label>
                        <input type="text" name="phone" class="form-control bg-light border-0" placeholder="77xxxxxxx" required>
                    </div>
                </div>
            </div>

            <!-- العمود الثالث: الأمان والاعتماد -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100" style="border-top: 5px solid #D4AF37 !important;">
                    <div class="d-flex align-items-center mb-3">
                        <i class="fas fa-lock fa-lg me-2" style="color: #4B0082;"></i>
                        <h5 class="fw-bold mb-0">كلمة المرور</h5>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">كلمة المرور الأولية</label>
                        <input type="password" name="password" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mt-auto">
                        <button type="submit" class="btn w-100 fw-bold" style="background: #D4AF37; color: white; transition: 0.3s;">
                            حفظ واعتماد المورد <i class="fas fa-check-circle ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<style>
    .form-control:focus {
        box-shadow: none;
        border: 1px solid #D4AF37 !important;
    }
    .btn:hover {
        background: #4B0082 !important;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
