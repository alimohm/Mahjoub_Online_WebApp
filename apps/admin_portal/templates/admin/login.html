<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الوصول السيادية | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #08020d 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        .login-card {
            background: rgba(26, 11, 46, 0.8);
            border: 1px solid var(--mahjoub-gold);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.15);
            text-align: center;
            border: 2px solid #D4AF37;
        }

        .logo-login {
            width: 100px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        .login-card h2 {
            color: #fff;
            font-weight: 900;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .login-card p {
            color: #D4AF37;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #D4AF37;
            box-shadow: none;
            color: white;
        }

        .btn-login {
            background: linear-gradient(45deg, #D4AF37, #f1c40f);
            border: none;
            color: #1a0b2e;
            font-weight: 800;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .security-badge {
            margin-top: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-login" alt="Logo">
    <h2>الوصول السيادي</h2>
    <p>محجوب أونلاين | إدارة الحوكمة</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-danger py-2" style="font-size: 0.8rem;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" class="form-control" placeholder="معرف القائد" required>
        <input type="password" name="password" class="form-control" placeholder="شفيرة العبور" required>
        <button type="submit" class="btn-login">تفعيل الدخول</button>
    </form>

    <div class="security-badge">
        <i class="fas fa-shield-halved me-1"></i> محمي بنظام التشفير المركزي
    </div>
</div>

</body>
</html>
