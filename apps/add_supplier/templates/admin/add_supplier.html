{% extends "admin_base.html" %}

{% block title %}إضافة مورد جديد | محجوب أونلاين{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-white py-3">
            <h5 class="fw-bold mb-0" style="color: #4B0082;">تعميد مورد جديد في المنظومة</h5>
        </div>
        <div class="card-body p-4">
            <!-- هنا تضع فورم إضافة المورد الخاص بك -->
            <form id="addSupplierForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">اسم المستخدم</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">الاسم التجاري</label>
                        <input type="text" name="trade_name" class="form-control" required>
                    </div>
                    <!-- باقي الحقول... -->
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn" style="background: #D4AF37; color: white;">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
