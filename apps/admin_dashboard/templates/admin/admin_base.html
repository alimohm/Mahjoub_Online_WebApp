<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القيادة المركزية | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        :root { --royal-purple: #632C8F; --deep-black: #08020d; --mahjoub-gold: #D4AF37; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(180deg, var(--royal-purple) 0%, var(--deep-black) 100%); height: 100vh; position: fixed; right: 0; top: 0; z-index: 1100; box-shadow: -5px 0 25px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .nav-link { display: flex; align-items: center; padding: 12px 15px; color: rgba(255,255,255,0.8); text-decoration: none; border-radius: 12px; margin: 5px 10px; transition: 0.3s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: rgba(212, 175, 55, 0.2); color: var(--mahjoub-gold); }
        .main-wrapper { margin-right: 280px; width: calc(100% - 280px); }
        #dynamic-content-area { transition: opacity 0.3s ease; }
        .rotate { transform: rotate(-90deg); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header p-4 text-center border-bottom border-light border-opacity-10">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" width="50" alt="Logo">
            <h5 class="text-white mt-2 fw-bold">محجوب أونلاين</h5>
        </div>
        <nav class="nav-menu mt-3">
            <a href="javascript:void(0);" onclick="loadContent('{{ url_for('admin_dashboard.dashboard_home') }}', 'مركز القيادة والسيطرة', this)" class="nav-link active">
                <i class="fas fa-chart-line ms-3"></i> <span>مركز القيادة</span>
            </a>
            <button class="nav-link w-90 border-0 bg-transparent" onclick="toggleDropdown('supDrp', 'supArr')">
                <i class="fas fa-handshake ms-3"></i> <span>شركاء النجاح</span> <i class="fas fa-chevron-left ms-auto" id="supArr"></i>
            </button>
            <div id="supDrp" style="display:none;">
                <a href="javascript:void(0);" onclick="loadContent('{{ url_for('add_supplier.add_supplier_page') }}', 'تعميد مورد جديد', this)" class="nav-link small">
                    <i class="fas fa-user-plus ms-3"></i> تعميد جديد
                </a>
            </div>
            <a href="javascript:void(0);" onclick="loadContent('{{ url_for('wallet.wallet_home') }}', 'الفضاء المالي', this)" class="nav-link">
                <i class="fas fa-wallet ms-3"></i> <span>الفضاء المالي</span>
            </a>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="top-bar bg-white shadow-sm p-3 d-flex justify-content-between align-items-center">
            <h4 class="mb-0 fw-bold" id="page-main-title">مركز القيادة والسيطرة</h4>
        </header>
        <div class="p-4" id="dynamic-content-area">
            </div>
    </main>

    <script>
        function loadContent(url, title, element) {
            const contentArea = document.getElementById('dynamic-content-area');
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            if(element) element.classList.add('active');
            
            contentArea.style.opacity = '0.5';
            fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.text())
            .then(html => {
                contentArea.innerHTML = html;
                document.getElementById('page-main-title').innerText = title;
                contentArea.style.opacity = '1';
                history.pushState({url: url, title: title}, title, url);
            });
        }
        function toggleDropdown(id, arrow) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "block") ? "none" : "block";
            document.getElementById(arrow).classList.toggle("rotate");
        }
        // تحميل الداشبورد عند بدء التشغيل
        window.onload = () => loadContent("{{ url_for('admin_dashboard.dashboard_home') }}", "مركز القيادة والسيطرة");
    </script>
</body>
</html>
